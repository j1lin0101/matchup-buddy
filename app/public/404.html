<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <script>
      var l = window.location;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?p=' + encodeURIComponent(l.pathname) + (l.search ? '&q=' + l.search.slice(1) : '') + l.hash);
    </script>
  </head>
</html>
